name: "Internal: security scan"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  repo-security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      # Temporary fix for https://github.com/pnpm/pnpm/issues/11265. Remove --ignore-registry-errors asap.
      - run: pnpm audit --audit-level high --prod --ignore-registry-errors

      - uses: actions/dependency-review-action@v4
        with:
          # minimatch <10.2.1 ReDoS (GHSA-3ppc-4f35-3m26) — no patch exists for
          # the 3.x line. All affected paths are dev/test-only dependencies
          # (serve-handler, maximatch, jest/glob) with developer-controlled patterns.
          allow-ghsas: GHSA-3ppc-4f35-3m26
