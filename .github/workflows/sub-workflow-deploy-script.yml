name: "Internal: sub-workflow: deploy components and auth handover scripts for environment"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      artifact-id:
        required: true
        type: string
      branch:
        required: false
        type: string
        default: ""
    secrets:
      BLOB_STORAGE_CONNECTION_STRING:
        required: true

env:
  BUILD_ARTIFACT_NAME: build-artifact

permissions:
  contents: read

jobs:
  deploy-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - uses: actions/download-artifact@v8
        id: download
        with:
          artifact-ids: ${{ inputs.artifact-id }}
          path: ./to-deploy

      - run: |
          cp ./configuration/config.${{ inputs.environment }}.json ./to-deploy/config.json

          if [ -f "./configuration/config.${{ inputs.environment }}.notification.json" ]; then
            cp ./configuration/config.${{ inputs.environment }}.notification.json ./to-deploy/notification.json
          fi

          # cps-global-components.js is the legacy URL redirect stub. Substitute the target URL
          # from the env's REDIRECT_SCRIPT_URL config. Defaults to sibling ./global-components.js.
          REDIRECT_SCRIPT_URL=$(jq -r '.REDIRECT_SCRIPT_URL // "./global-components.js"' ./to-deploy/config.json)
          echo "Redirect stub target: $REDIRECT_SCRIPT_URL"
          sed -i "s|{{SCRIPT_URL}}|$REDIRECT_SCRIPT_URL|g" ./to-deploy/cps-global-components.js

          # The stub also fires a beacon (dummy 404) so blob logs capture the host page URL —
          # the referer header is stripped by most browsers so this is our only signal.
          ACCOUNT_NAME=$(echo "${{ secrets.BLOB_STORAGE_CONNECTION_STRING }}" | grep -oP 'AccountName=\K[^;]+')
          BEACON_URL="https://$ACCOUNT_NAME.blob.core.windows.net/${{ inputs.environment }}/legacy-caller-beacon"
          echo "Beacon URL: $BEACON_URL"
          sed -i "s|{{BEACON_URL}}|$BEACON_URL|g" ./to-deploy/cps-global-components.js

      - uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage container create \
              --name ${{ inputs.environment }} \
              --public-access container \
              --connection-string "${{ secrets.BLOB_STORAGE_CONNECTION_STRING }}"

            METADATA="buildsha=${{ steps.short-sha.outputs.sha }} buildrunid=${{ github.run_number }} buildtimestamp=\"${{ github.event.repository.updated_at }}\""
            if [ -n "${{ inputs.branch }}" ]; then
              METADATA="${METADATA} branch=\"${{ inputs.branch }}\""
            fi

            az storage blob upload-batch \
              --destination ${{ inputs.environment }} \
              --source "./to-deploy" \
              --connection-string "${{ secrets.BLOB_STORAGE_CONNECTION_STRING }}" \
              --overwrite true \
              --content-cache-control "max-age=20, stale-while-revalidate=3600, stale-if-error=3600" \
              --metadata $METADATA
