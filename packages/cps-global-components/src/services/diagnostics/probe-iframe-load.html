<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>probe-iframe-load</title>
</head>
<body>
<script>
(() => {
  const parentOrigin = location.ancestorOrigins?.[0];
  if (!parentOrigin) {
    return;
  }
  if (location.origin === parentOrigin) {
    window.parent.postMessage({ type: "iframe-loaded" }, parentOrigin);
    return;
  }
  window.parent.postMessage({ type: "iframe-public-loaded" }, parentOrigin);
  setTimeout(() => location.replace(parentOrigin + "/global-components" + location.pathname), 0);
})();
</script>
</body>
</html>
