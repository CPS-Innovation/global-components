<!DOCTYPE html>
<html lang="en">

<head>
  <title>Global components MSAL termination</title>
  <script>
    (function () {
      // Silent SSO: this page loads inside a hidden iframe; the parent MSAL
      // instance reads the iframe's location.hash via same-origin DOM. No
      // termination logic needs to run here, and skipping the bundle fetch
      // keeps every ssoSilent cheap. The in-bundle iframe guard remains as
      // belt-and-braces.
      if (window.self !== window.top) return;
      var s = document.createElement('script');
      s.src = './msal-redirect.js';
      s.setAttribute('data-client-id', '{{AD_CLIENT_ID}}');
      s.setAttribute('data-authority', '{{AD_TENANT_AUTHORITY}}');
      document.head.appendChild(s);
    })();
  </script>
</head>
<!--
  Same-origin termination page for global-components MSAL flows. Two callers:

  - Silent SSO (#FCT2-8790, original use). Top frame is the host app; this
    page loads inside a hidden iframe. The inline guard above bails before
    fetching the bundle — the parent MSAL instance reads the hash directly.

  - Full-page redirect (#FCT2-17451). Top frame IS this page after AAD bounces
    back. The inline script injects msal-redirect.js, which calls
    handleRedirectPromise() to consume the hash, after which MSAL navigates
    back to the originating URL (navigateToLoginRequestUrl: true).

  AD_CLIENT_ID and AD_TENANT_AUTHORITY are substituted per environment via
  sed in sub-workflow-deploy-script.yml. Empty strings if a config does not
  set them — the bundle bails out in that case.
-->

</html>
