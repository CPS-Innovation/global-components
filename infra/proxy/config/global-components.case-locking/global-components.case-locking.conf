js_import glocoCaseLocking from templates/global-components.case-locking.js;

# Proxy Azure SignalR Service (path injected by filterNegotiateBody so the
#  client connects same-origin instead of cross-origin to *.service.signalr.net).
#  Must come BEFORE the /api/(.*) block so the more-specific regex wins.
location ~ ^/global-components/case-locking/api/sr/(.*)$ {
  error_page 418 = @gloco_preflight;
  if ($request_method = OPTIONS) {
    return 418;
  }

  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Allow-Credentials;
  add_header Access-Control-Allow-Origin $cors_origin always;
  add_header Access-Control-Allow-Credentials true always;

  resolver ${WEBSITE_DNS_SERVER} ipv6=off valid=30s;
  proxy_ssl_server_name on;
  proxy_ssl_verify off;
  proxy_set_header Host sr-cms-presence.service.signalr.net;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;

  proxy_pass https://sr-cms-presence.service.signalr.net/$1$is_args$args;
}

# Proxy SignalR presence hub for case-locking PoC (WebSocket-capable).
# The negotiate response is rewritten via js_body_filter to redirect the client
# at our same-origin /api/sr/ path instead of *.service.signalr.net.
location ~ ^/global-components/case-locking/api/(.*)$ {
  error_page 418 = @gloco_preflight;
  if ($request_method = OPTIONS) {
    return 418;
  }

  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Allow-Credentials;
  add_header Access-Control-Allow-Origin $cors_origin always;
  add_header Access-Control-Allow-Credentials true always;

  resolver ${WEBSITE_DNS_SERVER} ipv6=off valid=30s;
  proxy_ssl_server_name on;
  proxy_ssl_verify off;
  proxy_set_header Host app-cms-presence-api.azurewebsites.net;
  proxy_set_header Accept-Encoding "";  # disable upstream compression for body filter

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;

  proxy_pass https://app-cms-presence-api.azurewebsites.net/$1$is_args$args;

  js_header_filter glocoCaseLocking.dropContentLengthForNegotiate;
  js_body_filter glocoCaseLocking.filterNegotiateBody buffer_type=string;
}

# Proxy case-locking static assets from blob storage (dev/test/prod environments)
location ~ ^/global-components/case-locking/(dev|test|prod)/(.*)$ {
  error_page 418 = @gloco_preflight;
  if ($request_method = OPTIONS) {
    return 418;
  }
  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Allow-Credentials;
  add_header Access-Control-Allow-Origin * always;
  resolver ${WEBSITE_DNS_SERVER} ipv6=off valid=30s;
  proxy_ssl_server_name on;
  proxy_ssl_verify off;
  proxy_pass_request_headers off;
  proxy_set_header Host ${CPS_GLOBAL_COMPONENTS_BLOB_STORAGE_DOMAIN};
  proxy_pass https://${CPS_GLOBAL_COMPONENTS_BLOB_STORAGE_DOMAIN}/case-locking/$1/$2;
}
